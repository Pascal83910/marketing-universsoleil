name: Vigie — Veille hebdomadaire appels d'offre

on:
  schedule:
    # Chaque mardi à 5h36 UTC (= 7h36 heure française en été, 6h36 en hiver)
    - cron: "36 5 * * 2"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Mode test : affiche le rapport sans envoyer l'email"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  vigie:
    name: Veille appels d'offre
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install anthropic

      - name: Lancer Vigie
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python vigie/vigie.py
